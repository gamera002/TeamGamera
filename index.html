<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TΞΔM GΛMΞRΔ | Compteur de visiteurs</title>

<style>
/* Style de base (non modifié) */
body {
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 20px;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}
#visits {
  font-size: 2rem;
  font-weight: bold;
  color: #25D366;
}
</style>
</head>
<body>

<h1>Bienvenue sur notre site ! 👋</h1>
<p>Nombre de visiteurs :</p>

<!-- Affichage du nombre de visites -->
<div id="visits">Chargement...</div>

<script>
fetch("visits.json")
  .then((response) => {
    if (!response.ok) {
      throw new Error("Erreur lors du chargement de visits.json");
    }
    return response.json();
  })
  .then((data) => {
    let visits = data.visits + 1; // Incrémenter le nombre de visites

    // Afficher les visites mises à jour
    const el = document.getElementById("visits");
    if (el) {
      el.innerText = visits;
    }
  })
  .catch((error) => {
    console.error("Erreur :", error);
    const el = document.getElementById("visits");
    if (el) {
      el.innerText = "Erreur";
    }
  });
</script>

</body>
</html>
