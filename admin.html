<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TΞΔM GΛMΞRΔ | Admin Panel</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    overflow-x: hidden;
}

#particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
}

body > * {
    position: relative;
    z-index: 1;
}

/* LOGIN SECTION */
.login-container {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.login-box {
    background: linear-gradient(145deg, #1e293b, #0f172a);
    border: 2px solid rgba(255, 0, 0, 0.6);
    border-radius: 15px;
    padding: 40px;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
}

.login-box h1 {
    text-align: center;
    margin-bottom: 30px;
    text-shadow: 0 0 10px #ff0000;
    font-size: 1.8rem;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
}

.form-group input {
    width: 100%;
    padding: 12px;
    border: 1px solid rgba(255, 0, 0, 0.3);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.05);
    color: white;
    transition: 0.3s;
}

.form-group input:focus {
    outline: none;
    border-color: #ff0000;
    box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
}

.login-btn {
    width: 100%;
    padding: 12px;
    background: #ff0000;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.login-btn:hover:not(:disabled) {
    background: #ff3333;
    transform: scale(1.02);
}

.login-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.error-message {
    color: #ff6666;
    text-align: center;
    margin-top: 15px;
    padding: 10px;
    background: rgba(255, 0, 0, 0.1);
    border-radius: 5px;
    border: 1px solid rgba(255, 0, 0, 0.3);
    display: none;
}

/* ADMIN PANEL */
.admin-panel {
    padding: 40px 20px;
    max-width: 1200px;
    margin: 0 auto;
    display: none;
}

.admin-panel.active {
    display: block;
}

.admin-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    flex-wrap: wrap;
    gap: 20px;
}

.admin-header h1 {
    font-size: 2rem;
    text-shadow: 0 0 10px #ff0000;
}

.logout-btn {
    background: #ff0000;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.logout-btn:hover {
    background: #ff3333;
}

.admin-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.stat-card {
    background: linear-gradient(145deg, #1e293b, #0f172a);
    border: 1px solid rgba(255, 0, 0, 0.4);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
}

.stat-card h3 {
    color: #ff0000;
    margin-bottom: 10px;
}

.stat-card .number {
    font-size: 2rem;
    font-weight: bold;
    color: #25D366;
}

.admin-content {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
}

@media (max-width: 900px) {
    .admin-content {
        grid-template-columns: 1fr;
    }
}

.section {
    background: linear-gradient(145deg, #1e293b, #0f172a);
    border: 2px solid rgba(255, 0, 0, 0.3);
    border-radius: 12px;
    padding: 25px;
}

.section h2 {
    color: #ff0000;
    margin-bottom: 20px;
    text-shadow: 0 0 5px #ff0000;
}

.questions-list {
    max-height: 500px;
    overflow-y: auto;
    padding: 10px;
}

.question-item {
    background: rgba(255, 0, 0, 0.05);
    border-left: 4px solid #ff0000;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}

.question-item:hover {
    background: rgba(255, 0, 0, 0.1);
    transform: translateX(5px);
}

.question-item.answered {
    border-left-color: #25D366;
    background: rgba(37, 211, 102, 0.05);
}

.question-item.selected {
    border: 2px solid #25D366;
    background: rgba(37, 211, 102, 0.1);
}

.question-pseudo {
    color: #25D366;
    font-weight: bold;
    margin-bottom: 8px;
    font-size: 0.95rem;
}

.question-text {
    color: white;
    margin-bottom: 8px;
    font-size: 0.9rem;
}

.question-status {
    font-size: 0.8rem;
    color: #999;
}

.question-status.has-answer {
    color: #25D366;
}

/* ANSWER FORM */
.answer-form {
    display: none;
}

.answer-form.active {
    display: block;
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
    color: white;
}

.form-group input,
.form-group textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid rgba(255, 0, 0, 0.3);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.05);
    color: white;
    font-family: Arial, sans-serif;
    transition: 0.3s;
}

.form-group input:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #ff0000;
    box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
}

.form-group textarea {
    resize: vertical;
    min-height: 100px;
}

.form-group p {
    color: #25D366;
    padding: 10px;
    background: rgba(37, 211, 102, 0.1);
    border-radius: 5px;
    font-size: 0.95rem;
    line-height: 1.5;
}

.form-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

.form-buttons button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.save-btn {
    background: #25D366;
    color: white;
}

.save-btn:hover:not(:disabled) {
    background: #1fa050;
}

.cancel-btn {
    background: #666;
    color: white;
}

.cancel-btn:hover {
    background: #888;
}

.save-btn:disabled,
.cancel-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.form-message {
    padding: 10px;
    border-radius: 5px;
    margin-top: 15px;
    text-align: center;
    font-weight: bold;
    display: none;
}

.form-message.success {
    background: rgba(37, 211, 102, 0.2);
    border: 1px solid #25D366;
    color: #25D366;
}

.form-message.error {
    background: rgba(255, 0, 0, 0.2);
    border: 1px solid #ff0000;
    color: #ff6666;
}

.empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #999;
}

.no-selection {
    text-align: center;
    padding: 60px 20px;
    color: #999;
    font-size: 1.1rem;
}

.scrollbar-hidden {
    scrollbar-width: thin;
    scrollbar-color: rgba(255, 0, 0, 0.3) transparent;
}

.scrollbar-hidden::-webkit-scrollbar {
    width: 6px;
}

.scrollbar-hidden::-webkit-scrollbar-track {
    background: transparent;
}

.scrollbar-hidden::-webkit-scrollbar-thumb {
    background: rgba(255, 0, 0, 0.3);
    border-radius: 3px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- LOGIN SECTION -->
<div class="login-container" id="loginSection">
    <div class="login-box">
        <h1>🔐 Admin Panel</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="password">Mot de passe admin</label>
                <input type="password" id="password" placeholder="Entrez le mot de passe" required>
            </div>
            <button type="submit" class="login-btn">Se connecter</button>
            <div class="error-message" id="errorMessage"></div>
        </form>
    </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="adminPanel">
    <div class="admin-header">
        <h1>⚙️ Panneau Admin</h1>
        <button class="logout-btn" id="logoutBtn">📤 Déconnexion</button>
    </div>

    <div class="admin-stats">
        <div class="stat-card">
            <h3>Questions reçues</h3>
            <div class="number" id="totalQuestions">0</div>
        </div>
        <div class="stat-card">
            <h3>Questions répondues</h3>
            <div class="number" id="answeredQuestions">0</div>
        </div>
        <div class="stat-card">
            <h3>Questions en attente</h3>
            <div class="number" id="pendingQuestions">0</div>
        </div>
    </div>

    <div class="admin-content">
        <!-- QUESTIONS LIST -->
        <div class="section">
            <h2>📨 Questions</h2>
            <div class="questions-list scrollbar-hidden" id="questionsList">
                <div class="empty-state">⏳ Chargement...</div>
            </div>
        </div>

        <!-- ANSWER FORM -->
        <div class="section">
            <h2>✏️ Répondre</h2>
            <div class="answer-form" id="answerForm">
                <div class="form-group">
                    <label>Question:</label>
                    <p id="selectedQuestion"></p>
                </div>

                <div class="form-group">
                    <label for="answerText">Réponse *</label>
                    <textarea id="answerText" placeholder="Tape ta réponse ici..." required maxlength="1000"></textarea>
                </div>

                <div class="form-buttons">
                    <button type="button" class="save-btn" id="saveAnswerBtn">💾 Sauvegarder</button>
                    <button type="button" class="cancel-btn" id="cancelBtn">❌ Annuler</button>
                </div>

                <div class="form-message" id="answerMessage"></div>
            </div>

            <div class="no-selection" id="noSelectionState">
                <p>👆 Sélectionne une question à gauche pour répondre</p>
            </div>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/particles.js"></script>
<script src="js/admin-panel.js"></script>

</body>
</html>
